<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Panini FIFA World Cup 2026 — Sticker Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f8f6;--surface:#ffffff;--surface2:#f2f1ee;--border:#e0ddd8;--border2:#ccc9c2;
  --text:#1a1a18;--text2:#5a5955;--text3:#8a8882;
  --green:#3B6D11;--green-bg:#EAF3DE;--green-border:#639922;
  --amber:#854F0B;--amber-bg:#FAEEDA;--amber-border:#BA7517;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-border:#378ADD;
  --purple:#3C3489;--purple-bg:#EEEDFE;--purple-border:#7F77DD;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-border:#E24B4A;
  --radius:10px;--radius-sm:6px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a18;--surface:#242420;--surface2:#2e2e2a;--border:#3a3a36;--border2:#4a4a44;
    --text:#f0ede8;--text2:#a0a09a;--text3:#6a6a64;
    --green-bg:#1a2e0a;--amber-bg:#2e1e06;--blue-bg:#0a1e38;--purple-bg:#16103a;--red-bg:#2e0a0a;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%}
.page{max-width:900px;margin:0 auto;padding:16px}

/* HEADER */
.app-header{padding:20px 0 16px;border-bottom:1px solid var(--border);margin-bottom:16px}
.app-header h1{font-size:20px;font-weight:600;letter-spacing:-.3px}
.app-header .sub{font-size:13px;color:var(--text2);margin-top:3px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 8px;text-align:center}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.stat-num{font-size:22px;font-weight:600}
.stat-num.green{color:var(--green)}
.stat-num.amber{color:var(--amber)}
.stat-num.red{color:var(--red)}
.stat-num.blue{color:var(--blue)}

/* PROGRESS BAR */
.progress-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px}
.progress-card .row{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:8px}
.progress-card .row strong{color:var(--text);font-weight:600}
.bar-track{height:10px;border-radius:5px;background:var(--surface2);overflow:hidden}
.bar-fill{height:100%;border-radius:5px;background:var(--green);transition:width .4s ease}

/* CONTROLS */
.controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:stretch}
.controls input[type=text]{flex:1;min-width:140px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:14px;outline:none}
.controls input[type=text]:focus{border-color:var(--border2)}
.controls select{padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:14px;outline:none;cursor:pointer}
.btn-row{display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:8px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit}
.btn:hover{background:var(--surface2)}
.btn:active{opacity:.8;transform:scale(.98)}
.btn.green{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.btn.red{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}

/* LEGEND */
.legend{display:flex;gap:14px;font-size:12px;color:var(--text2);margin-bottom:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px}
.ld{width:12px;height:12px;border-radius:3px;flex-shrink:0}

/* SECTION */
.section{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:opacity .2s}
.section.hidden{display:none}
.sec-header{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;user-select:none;transition:background .15s}
.sec-header:hover{background:var(--surface2)}
.sec-left{display:flex;align-items:center;gap:8px;min-width:0}
.sec-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sec-count{font-size:12px;color:var(--text2);white-space:nowrap}
.sec-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.mini-bar-wrap{width:60px;height:5px;border-radius:3px;background:var(--surface2);overflow:hidden}
.mini-bar-inner{height:100%;border-radius:3px;transition:width .4s}
.sec-pct{font-size:12px;font-weight:600;min-width:32px;text-align:right}
.chevron{font-size:18px;color:var(--text3);transition:transform .2s;line-height:1}
.chevron.open{transform:rotate(180deg)}
.sec-color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* STICKER GRID */
.sticker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:5px;padding:8px;border-top:1px solid var(--border)}
@media(max-width:480px){.sticker-grid{grid-template-columns:repeat(2,1fr);gap:5px;padding:6px}}

/* STICKER CARD */
.sticker-card{border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 8px;cursor:pointer;transition:background .12s,border-color .12s;display:flex;flex-direction:column;gap:3px;background:var(--surface);position:relative;-webkit-tap-highlight-color:transparent}
.sticker-card:hover{background:var(--surface2)}
.sticker-card:active{transform:scale(.97)}
.sticker-card.hidden{display:none}
.sticker-card.collected{background:var(--green-bg);border-color:var(--green-border)}
.sticker-top{display:flex;align-items:center;justify-content:space-between;gap:4px}
.sticker-code{font-size:10px;font-weight:600;color:var(--text3)}
.sticker-card.collected .sticker-code{color:var(--green)}
.badges{display:flex;gap:3px;flex-wrap:wrap}
.badge{font-size:9px;padding:1px 5px;border-radius:99px;line-height:1.4}
.badge.foil{background:var(--amber-bg);color:var(--amber);border:0.5px solid var(--amber-border)}
.badge.check{background:var(--green);color:white}
.sticker-name{font-size:11px;color:var(--text);line-height:1.3}
.sticker-card.collected .sticker-name{color:var(--green)}

/* DUPE COUNTER */
.dupe-row{display:flex;align-items:center;gap:6px;margin-top:4px}
.dupe-label{font-size:10px;color:var(--text3);flex-shrink:0}
.dupe-counter{display:flex;align-items:center;gap:3px}
.dupe-btn{width:20px;height:20px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:13px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;font-family:inherit}
.dupe-btn:hover{background:var(--surface2)}
.dupe-btn:active{transform:scale(.9)}
.border-btn{font-size:10px;padding:2px 7px;border-radius:99px;border:1px solid var(--purple-border);background:transparent;color:var(--purple);cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:background .12s,color .12s;line-height:1.5}
.border-btn.active{background:var(--purple-bg);color:var(--purple);font-weight:600}
.border-btn:active{transform:scale(.95)}
.dupe-num{font-size:11px;font-weight:600;min-width:14px;text-align:center;color:var(--text)}
.dupe-num.has{color:var(--amber)}

/* COCA COLA SECTION HEADER STYLE */
.cc-header{background:linear-gradient(135deg,#fff 0%,#fff9ee 100%)}
@media(prefers-color-scheme:dark){.cc-header{background:var(--surface)}}

/* MOBILE FIXES */
@media(max-width:600px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .stat-num{font-size:20px}
  .controls{gap:6px}
  .sec-title{font-size:13px}
  .btn{padding:8px 10px;font-size:12px}
  .app-header h1{font-size:17px}
  .mini-bar-wrap{display:none}
}
@media(max-width:360px){
  .btn-row .btn{flex:1;text-align:center}
}
</style>
</head>

<div class="page">

<div class="app-header">
  <h1>⚽ Panini FIFA World Cup 2026</h1>
  <div class="sub">Sticker tracker · tap any sticker to mark collected · tap duplicates +/− to track extras</div>
</div>

<div class="stats-grid">
  <div class="stat"><div class="stat-label">Total</div><div class="stat-num" id="sTotal">0</div></div>
  <div class="stat"><div class="stat-label">Collected</div><div class="stat-num green" id="sCollected">0</div></div>
  <div class="stat"><div class="stat-label">Missing</div><div class="stat-num red" id="sMissing">0</div></div>
  <div class="stat"><div class="stat-label">Complete</div><div class="stat-num amber" id="sPct">0%</div></div>
</div>
<div class="stats-grid">
  <div class="stat"><div class="stat-label">Duplicates</div><div class="stat-num blue" id="sDupes">0</div></div>
  <div class="stat"><div class="stat-label">w/ Border</div><div class="stat-num purple" style="color:var(--purple)" id="sBorders">0</div></div>
  <div class="stat"><div class="stat-label">Foils</div><div class="stat-num amber" id="sFoils">0</div></div>
  <div class="stat"><div class="stat-label">Teams done</div><div class="stat-num green" id="sTeamsDone">0</div></div>
</div>

<div class="progress-card">
  <div class="row"><span>Overall progress</span><strong><span id="barPct">0%</span> · <span id="barLabel">0 / 0</span></strong></div>
  <div class="bar-track"><div class="bar-fill" id="globalBar" style="width:0%"></div></div>
</div>

<div class="controls">
  <input type="text" id="searchBox" placeholder="Search player, team, code…" oninput="filterAll()">
  <select id="filterSel" onchange="filterAll()">
    <option value="all">All stickers</option>
    <option value="missing">Missing only</option>
    <option value="collected">Collected only</option>
    <option value="foil">Foil only</option>
    <option value="dupes">Has duplicates</option>
    <option value="borders">Has borders</option>
  </select>
</div>
<div class="btn-row" style="margin-bottom:12px">
  <button class="btn green" onclick="markAllVisible(true)">✓ Mark all visible</button>
  <button class="btn red" onclick="markAllVisible(false)">✕ Unmark visible</button>
  <button class="btn" onclick="resetAll()">↺ Reset all</button>
  <button class="btn" onclick="exportList()">↓ Export missing</button>
  <button class="btn" style="background:#9a9a94;color:#fff;border-color:#9a9a94" onclick="exportData()">⇪ Export data</button>
  <button class="btn" style="background:#9a9a94;color:#fff;border-color:#9a9a94" onclick="document.getElementById('importFile').click()">⇩ Import data</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
</div>

<div class="legend">
  <div class="legend-item"><div class="ld" style="background:var(--green-bg);border:1px solid var(--green-border)"></div> Collected</div>
  <div class="legend-item"><div class="ld" style="background:var(--surface);border:1px solid var(--border)"></div> Missing</div>
  <div class="legend-item"><div class="ld" style="background:var(--amber-bg);border:1px solid var(--amber-border)"></div> Foil sticker</div>
  <div class="legend-item"><div class="ld" style="background:var(--blue-bg);border:1px solid var(--blue-border)"></div> Duplicate</div>
  <div class="legend-item"><div class="ld" style="background:var(--purple-bg);border:1px solid var(--purple-border)"></div> Has border version</div>
</div>

<div id="sectionsContainer"></div>

</div>

const STORE = 'panini_wc2026_v2';
let state = {collected:{}, dupes:{}, borders:{}};

function save(){try{localStorage.setItem(STORE,JSON.stringify(state));}catch(e){}}
function load(){try{const d=localStorage.getItem(STORE);if(d)state=JSON.parse(d);}catch(e){}}

function toggleCollect(code,el){
  state.collected[code]=!state.collected[code];
  if(!state.collected[code]){delete state.collected[code];}
  save(); renderCard(code,el); updateStats();
}

function changeDupe(code,delta,el,e){
  e.stopPropagation();
  state.dupes[code]=(state.dupes[code]||0)+delta;
  if(state.dupes[code]<0)state.dupes[code]=0;
  save();
  const numEl=el.querySelector('.dupe-num.dupe');
  if(numEl){numEl.textContent=state.dupes[code]||0;numEl.className='dupe-num dupe'+(state.dupes[code]>0?' has':'');}
  updateStats();
}
function toggleBorder(code,btn,e){
  e.stopPropagation();
  state.borders[code]=!state.borders[code];
  if(!state.borders[code])delete state.borders[code];
  save();
  btn.classList.toggle('active',!!state.borders[code]);
  btn.textContent='Border';
  updateStats();
}

function renderCard(code,el){
  const isCol=!!state.collected[code];
  el.classList.toggle('collected',isCol);
  const check=el.querySelector('.badge.check');
  if(check)check.style.display=isCol?'inline':'none';
}

function updateStats(){
  let total=0,col=0,foilCol=0,totalFoils=0,totalDupes=0,totalBorders=0,teamsDone=0;
  TEAMS.forEach(t=>{
    let tTotal=t.stickers.length,tCol=0;
    t.stickers.forEach(s=>{
      total++; if(s.foil)totalFoils++;
      if(state.collected[s.code]){col++;tCol++;if(s.foil)foilCol++;}
      totalDupes+=(state.dupes[s.code]||0);
      if(state.borders[s.code])totalBorders++;
    });
    if(tCol===tTotal)teamsDone++;
  });
  document.getElementById('sTotal').textContent=total;
  document.getElementById('sCollected').textContent=col;
  document.getElementById('sMissing').textContent=total-col;
  const pct=total?Math.round(col/total*100):0;
  document.getElementById('sPct').textContent=pct+'%';
  document.getElementById('globalBar').style.width=pct+'%';
  document.getElementById('barPct').textContent=pct+'%';
  document.getElementById('barLabel').textContent=col+' / '+total;
  document.getElementById('sDupes').textContent=totalDupes;
  document.getElementById('sBorders').textContent=totalBorders;
  document.getElementById('sFoils').textContent=foilCol+' / '+totalFoils;
  document.getElementById('sTeamsDone').textContent=teamsDone;

  TEAMS.forEach(t=>{
    const col2=t.stickers.filter(s=>state.collected[s.code]).length;
    const pct2=t.stickers.length?Math.round(col2/t.stickers.length*100):0;
    const pctEl=document.getElementById('pct_'+t.id);
    const barEl=document.getElementById('bar_'+t.id);
    const cntEl=document.getElementById('cnt_'+t.id);
    if(pctEl)pctEl.textContent=pct2+'%';
    if(barEl)barEl.style.width=pct2+'%';
    if(cntEl)cntEl.textContent=col2+'/'+t.stickers.length;
  });
}

function filterAll(){
  const q=document.getElementById('searchBox').value.toLowerCase();
  const f=document.getElementById('filterSel').value;
  TEAMS.forEach(t=>{
    const sec=document.getElementById('sec_'+t.id);
    if(!sec)return;
    let secVis=false;
    t.stickers.forEach(s=>{
      const el=document.getElementById('sc_'+s.code);
      if(!el)return;
      const matchQ=!q||s.code.toLowerCase().includes(q)||s.name.toLowerCase().includes(q)||t.label.toLowerCase().includes(q);
      const matchF=f==='all'||(f==='collected'&&state.collected[s.code])||(f==='missing'&&!state.collected[s.code])||(f==='foil'&&s.foil)||(f==='dupes'&&(state.dupes[s.code]||0)>0)||(f==='borders'&&(state.borders[s.code]||0)>0);
      const show=matchQ&&matchF;
      el.classList.toggle('hidden',!show);
      if(show)secVis=true;
    });
    sec.style.display=secVis?'':'none';
    if(q&&secVis){
      const grid=sec.querySelector('.sticker-grid');
      if(grid&&grid.style.display==='none'){grid.style.display='grid';const ch=sec.querySelector('.chevron');if(ch)ch.classList.add('open');}
    }
  });
}

function markAllVisible(val){
  TEAMS.forEach(t=>t.stickers.forEach(s=>{
    const el=document.getElementById('sc_'+s.code);
    if(el&&!el.classList.contains('hidden')){state.collected[s.code]=val;if(!val)delete state.collected[s.code];renderCard(s.code,el);}
  }));
  save();updateStats();
}

function resetAll(){
  if(!confirm('Reset all collected, duplicates, and borders? This cannot be undone.'))return;
  state={collected:{},dupes:{},borders:{}};save();
  document.querySelectorAll('.sticker-card.collected').forEach(el=>{el.classList.remove('collected');const ch=el.querySelector('.badge.check');if(ch)ch.style.display='none';});
  document.querySelectorAll('.dupe-num').forEach(el=>{el.textContent='0';el.classList.remove('has');});
  updateStats();
}

function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='wc2026_sticker_data.json';a.click();
}

function importData(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data||typeof data!=='object')throw new Error('bad');
      state={collected:data.collected||{},dupes:data.dupes||{},borders:data.borders||{}};
      save();
      document.getElementById('sectionsContainer').innerHTML='';
      build();updateStats();filterAll();
      alert('Import successful!');
    }catch(err){alert('Invalid file.');}
    event.target.value='';
  };
  reader.readAsText(file);
}

function exportList(){
  const lines=['Panini WC2026 — Missing Stickers','Generated: '+new Date().toLocaleDateString(),''];
  TEAMS.forEach(t=>{
    const missing=t.stickers.filter(s=>!state.collected[s.code]);
    if(missing.length){lines.push((t.flag?t.flag+' ':'')+t.label+' ('+missing.length+' missing)');missing.forEach(s=>lines.push('  '+s.code+' — '+s.name));lines.push('');}
  });
  const blob=new Blob([lines.join('\n')],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='missing_stickers.txt';a.click();
}

function toggleSection(id){
  const sec=document.getElementById('sec_'+id);
  const grid=sec.querySelector('.sticker-grid');
  const ch=sec.querySelector('.chevron');
  const open=grid.style.display!=='none';
  grid.style.display=open?'none':'grid';
  ch.classList.toggle('open',!open);
}

function hexToRgba(hex,alpha){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function build(){
  const container=document.getElementById('sectionsContainer');
  TEAMS.forEach(t=>{
    const sec=document.createElement('div');
    sec.className='section';sec.id='sec_'+t.id;
    const headerLabel=(t.flag?t.flag+' ':'')+t.label;
    const dotColor=t.color;
    const ccStyle=t.isCocaCola?`background:linear-gradient(135deg,${hexToRgba(t.color,0.06)} 0%,${hexToRgba(t.color,0.12)} 100%);border-color:${hexToRgba(t.color,0.4)};`:'';
    sec.innerHTML=`<div class="sec-header" onclick="toggleSection('${t.id}')" style="${ccStyle}">
      <div class="sec-left">
        <div class="sec-color-dot" style="background:${dotColor}"></div>
        <span class="sec-title">${headerLabel}</span>
        <span class="sec-count" id="cnt_${t.id}">0/${t.stickers.length}</span>
      </div>
      <div class="sec-right">
        <div class="mini-bar-wrap"><div class="mini-bar-inner" id="bar_${t.id}" style="width:0%;background:${dotColor}"></div></div>
        <span class="sec-pct" id="pct_${t.id}" style="color:${dotColor}">0%</span>
        <span class="chevron">›</span>
      </div>
    </div>
    <div class="sticker-grid" style="display:none"></div>`;
    const grid=sec.querySelector('.sticker-grid');
    t.stickers.forEach(s=>{
      const card=document.createElement('div');
      card.className='sticker-card'+(state.collected[s.code]?' collected':'');
      card.id='sc_'+s.code;
      card.onclick=function(){toggleCollect(s.code,card);};
      const dVal=state.dupes[s.code]||0;
      const bOn=!!state.borders[s.code];
      card.innerHTML=`<div class="sticker-top">
        <span class="sticker-code">${s.code}</span>
        <div class="badges">${s.foil?'<span class="badge foil">FOIL</span>':''}<span class="badge check" style="display:${state.collected[s.code]?'inline':'none'}">✓</span></div>
      </div>
      <div class="sticker-name">${s.name}</div>
      <div class="dupe-row">
        <span class="dupe-label">Dupe</span>
        <div class="dupe-counter">
          <button class="dupe-btn" onclick="changeDupe('${s.code}',-1,this.closest('.sticker-card'),event)">−</button>
          <span class="dupe-num dupe${dVal>0?' has':''}">${dVal}</span>
          <button class="dupe-btn" onclick="changeDupe('${s.code}',1,this.closest('.sticker-card'),event)">+</button>
        </div>
        <button class="border-btn${bOn?' active':''}" onclick="toggleBorder('${s.code}',this,event)">Border</button>
      </div>`;
      grid.appendChild(card);
    });
    container.appendChild(sec);
  });
}

load();build();updateStats();
